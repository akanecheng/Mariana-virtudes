<head>
  <meta charset="UTF-8">

  <title></title>
  <style>
     * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FDF1F0;
            color: #4A4A4A;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 39px;
            color: #7B141E;
            margin-bottom: 10px;
            text-align: center;
            padding: 50px;
        }

        p {
            font-style: italic;
            color: #D67F79;
            text-align: center;
        }
        
        
  </style>

<body>
  
  
  <h1>O que o silêncio ditou</h1>
  
  <p>Sozinha, mas não solitária, eu percorro o caminho.<br>
A cada passo, sinto sua mão abençoada a me guardar.<br>
Sou sua filha amada, sou delicada e sou forte,<br>
Na presença do Eterno, encontro meu norte.</p>
